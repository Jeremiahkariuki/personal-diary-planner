{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error | Jdiary</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .error-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .error-card {
            max-width: 500px;
            padding: 4rem 2rem;
            text-align: center;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #ef4444, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        h2 {
            font-size: 1.5rem;
            margin: 1.5rem 0 1rem;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
        }
    </style>
</head>

<body>
    <div class="background-decor">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="error-container">
        <div class="glass-card error-card">
            <h1 class="error-code">500</h1>
            <h2>Unexpected System Drift</h2>
            <p>Something went wrong on our end. We're looking into it. Please try again Later.</p>
            <a href="{% url 'index' %}" class="add-btn primary-btn"
                style="text-decoration:none; display:inline-block;">Try Again</a>
        </div>
    </div>
</body>

</html>
